<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        h3 {
            margin: 0 0 15px 0;
            color: #e94560;
        }
        .setting {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
        }
        input, select {
            width: 100%;
            padding: 5px;
            background: #16213e;
            border: 1px solid #0f3460;
            color: #eee;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        #startBtn {
            background: #00b894;
            color: white;
        }
        #stopBtn {
            background: #e94560;
            color: white;
            display: none;
        }
        #status {
            margin-top: 10px;
            padding: 8px;
            background: #0f0f23;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>🤖 Auto Trader</h3>
    
    <div class="setting">
        <label>Сумма ($):</label>
        <input type="number" id="amount" value="1" min="1" max="100">
    </div>
    
    <div class="setting">
        <label>Время (мин):</label>
        <input type="number" id="expiry" value="5" min="1" max="60">
    </div>
    
    <div class="setting">
        <label>Мин. уверенность (%):</label>
        <input type="number" id="minConfidence" value="70" min="50" max="100">
    </div>
    
    <div class="setting">
        <label>Направление:</label>
        <select id="direction">
            <option value="both">Оба</option>
            <option value="call">Только CALL</option>
            <option value="put">Только PUT</option>
        </select>
    </div>
    
    <button id="startBtn">▶ СТАРТ</button>
    <button id="stopBtn">⏹ СТОП</button>
    
    <div id="status">⏹ Остановлено</div>
    
    <script src="popup.js"></script>
</body>
</html>
